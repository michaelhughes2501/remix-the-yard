version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: the-yard-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src
      - ./server.ts:/app/server.ts
      - ./data:/app/data
      - /app/node_modules
    networks:
      - the-yard

networks:
  the-yard:
    driver: bridge

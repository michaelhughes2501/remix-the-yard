name: Security & YAML Scan

# Agent 1 wakes up on every push and pull request. This is the "always
# watching" behavior — event-driven rather than a process you babysit.
on:
  push:
    branches: [main, master, develop]
  pull_request:

# Least privilege: the scan only needs to read code and write a PR comment.
permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanner dependencies
        run: pip install pyyaml

      - name: Run YAML security scan (markdown for PR comment)
        id: scan
        run: |
          python -m scanner.run . --format markdown --fail-on high > scan_report.md \
            || echo "FAILED=1" >> "$GITHUB_ENV"
          cat scan_report.md

      - name: Emit JSON report for Agent 5
        if: always()
        run: |
          mkdir -p agent-reports
          python -m scanner.run . --format json --fail-on critical > agent-reports/security-scanner.json || true

      - name: Upload report for PR coordinator
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Unique name so it lives alongside the other agents' artifacts.
          name: agent-reports-security
          path: agent-reports/
          if-no-files-found: ignore

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('scan_report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if issues found
        if: env.FAILED == '1'
        run: |
          echo "::error::Security scan found issues at or above the 'high' threshold."
          exit 1

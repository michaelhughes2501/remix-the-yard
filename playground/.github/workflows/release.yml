# ─────────────────────────────────────────────────────────────────────────────
# Release workflow
# Triggered when you push a version tag:  git tag v1.0.0 && git push --tags
# Steps: install → build → zip → create GitHub Release → attach ZIP
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*.*.*"           # matches v1.0.0, v2.3.1, etc.

permissions:
  contents: write          # needed to create a GitHub Release

jobs:
  release:
    name: Build · ZIP · Publish Release
    runs-on: ubuntu-latest

    steps:
      # 1. Check out at the tagged commit
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the changelog can be generated

      # 2. Set up Node.js
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 3. Install & build
      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # 4. Name the ZIP after the version tag (e.g. project-v1.0.0.zip)
      - name: Create release ZIP
        run: |
          VERSION="${{ github.ref_name }}"
          zip -r "project-${VERSION}.zip" . \
            -x "*.git*"          \
            -x "node_modules/*"  \
            -x "coverage/*"      \
            -x ".env*"           \
            -x "*.log"
          echo "ZIP_NAME=project-${VERSION}.zip" >> $GITHUB_ENV

      # 5. Automatically generate a changelog from commit messages since the
      #    last tag and create a GitHub Release with the ZIP attached.
      - name: Create GitHub Release and attach ZIP
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## What's changed
            Auto-generated release for tag `${{ github.ref_name }}`.

            ### How to use
            Download `${{ env.ZIP_NAME }}` from the assets below — it contains
            the fully built project without `node_modules` or `.git`.

            ### Full changelog
            See [commits](${{ github.event.repository.html_url }}/commits/${{ github.ref_name }})
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true   # appends GitHub-generated release notes
